{% set version = "0.3.0" %}
{% set sha256 = "PLACEHOLDER_UPDATE_ON_RELEASE" %}

package:
  name: pytest-quantum
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/p/pytest-quantum/pytest_quantum-{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  entry_points:
    - pytest11 = pytest_quantum.plugin

requirements:
  host:
    - python >=3.11
    - pip
    - hatchling >=1.27
  run:
    - python >=3.11
    - pytest >=8.0
    - numpy >=2.0
    - scipy >=1.13

test:
  imports:
    - pytest_quantum
  commands:
    - pytest --help | grep quantum-shots
  requires:
    - pip

about:
  home: https://github.com/qbench/pytest-quantum
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: A cross-framework pytest plugin for quantum program testing
  description: |
    pytest-quantum provides framework-agnostic assertions, fixtures, and
    statistical utilities for testing quantum programs written in Qiskit,
    Cirq, Amazon Braket, PennyLane, Pytket, Stim, and Graphix.
  doc_url: https://pytest-quantum.readthedocs.io
  dev_url: https://github.com/qbench/pytest-quantum

extra:
  recipe-maintainers:
    - qbench
