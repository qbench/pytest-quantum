name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # -------------------------------------------------------------------------
  # Lint + type check (fast, runs on every push)
  # -------------------------------------------------------------------------
  lint:
    name: Lint & type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Ruff lint
        run: uv run --group dev ruff check src/ tests/
      - name: Ruff format check
        run: uv run --group dev ruff format --check src/ tests/
      - name: Mypy
        run: uv run --group dev mypy src/

  # -------------------------------------------------------------------------
  # Core tests (no quantum SDK) — fast, runs on all platforms + Python versions
  # -------------------------------------------------------------------------
  test-core:
    name: Core tests (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
      - name: Install core dependencies only
        run: uv sync --no-group dev
      - name: Run core tests
        run: uv run pytest tests/test_stats.py tests/test_plugin.py tests/test_assertions_states.py tests/test_assertions_distributions.py tests/test_assertions_unitary.py tests/test_assertions_structure.py tests/test_adapters.py tests/test_internal.py tests/test_config.py tests/test_markers.py tests/test_retry.py tests/test_reporting.py tests/test_assertions_resource_estimation.py tests/test_assertions_topology.py tests/test_assertions_tomography.py tests/test_assertions_qec.py tests/test_random_circuits.py tests/test_quantum_only.py -v --cov=pytest_quantum --cov-report=xml
      - name: Upload coverage
        uses: codecov/codecov-action@v5
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        with:
          files: ./coverage.xml

  # -------------------------------------------------------------------------
  # Qiskit integration tests
  # -------------------------------------------------------------------------
  test-qiskit:
    name: Qiskit integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.12"
      - name: Install with Qiskit extras
        run: uv sync --extra qiskit
      - name: Run Qiskit tests
        run: uv run pytest tests/test_integration_qiskit.py tests/test_integration_noise.py tests/test_assertions_structure.py tests/test_assertions_unitary.py -v

  # -------------------------------------------------------------------------
  # Cirq integration tests
  # -------------------------------------------------------------------------
  test-cirq:
    name: Cirq integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.12"
      - name: Install with Cirq extras
        run: uv sync --extra cirq
      - name: Run Cirq tests
        run: uv run pytest tests/test_integration_cirq.py -v

  # -------------------------------------------------------------------------
  # Cross-framework tests (needs both Qiskit + Cirq)
  # -------------------------------------------------------------------------
  test-cross-framework:
    name: Cross-framework tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.12"
      - name: Install Qiskit + Cirq
        run: uv sync --extra qiskit --extra cirq
      - name: Run cross-framework tests
        run: uv run pytest tests/test_integration_cross_framework.py -v

  # -------------------------------------------------------------------------
  # PennyLane integration tests
  # -------------------------------------------------------------------------
  test-pennylane:
    name: PennyLane integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.12"
      - name: Install with PennyLane extras
        run: uv sync --extra pennylane
      - name: Run PennyLane tests
        run: uv run pytest tests/test_integration_pennylane.py -v

  # -------------------------------------------------------------------------
  # Graphix integration tests
  # -------------------------------------------------------------------------
  test-graphix:
    name: Graphix integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.12"
      - name: Install with Graphix extras
        run: uv sync --extra graphix
      - name: Run Graphix tests
        run: uv run pytest tests/test_assertions_states.py tests/test_stats.py -v

  # -------------------------------------------------------------------------
  # Pytket integration tests
  # -------------------------------------------------------------------------
  test-pytket:
    name: Pytket integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.12"
      - name: Install with Pytket extras
        run: uv sync --extra pytket
      - name: Run Pytket tests
        run: uv run pytest tests/test_integration_pytket.py -v

  # -------------------------------------------------------------------------
  # Stim integration tests
  # -------------------------------------------------------------------------
  test-stim:
    name: Stim integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.12"
      - name: Install with Stim extras
        run: uv sync --extra stim
      - name: Run Stim tests
        run: uv run pytest tests/test_integration_stim.py -v

  # -------------------------------------------------------------------------
  # Braket integration tests (local simulator)
  # -------------------------------------------------------------------------
  test-braket:
    name: Braket integration tests (local simulator)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.12"
      - name: Install with Braket extras
        run: uv sync --extra braket
      - name: Run Braket tests
        run: uv run pytest tests/test_integration_braket.py -v

  # -------------------------------------------------------------------------
  # Mitiq integration tests
  # -------------------------------------------------------------------------
  test-mitiq:
    name: Mitiq integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.12"
      - name: Install with Mitiq extras
        run: uv sync --extra mitiq --extra qiskit
      - name: Run Mitiq tests
        run: uv run pytest tests/test_assertions_mitiq.py -v

  # -------------------------------------------------------------------------
  # Hypothesis property-based tests
  # -------------------------------------------------------------------------
  test-hypothesis:
    name: Hypothesis property-based tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.12"
      - name: Install dev dependencies
        run: uv sync --group dev
      - name: Run Hypothesis tests
        run: uv run pytest tests/test_hypothesis_strategies.py -v
