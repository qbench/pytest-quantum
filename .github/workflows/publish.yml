name: Publish to PyPI

on:
  push:
    tags:
      - "v*"  # triggers on tags like v0.1.0

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Build wheel + sdist
        run: uv build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/pytest-quantum
    permissions:
      id-token: write  # OIDC trusted publishing — no API token needed
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  smoke-test:
    name: Post-publish smoke test
    needs: publish
    runs-on: ubuntu-latest
    # Wait for PyPI to propagate the new release before installing
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Wait for PyPI propagation
        run: sleep 60

      - name: Install from PyPI (not local)
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          uv venv --clear
          uv pip install --python .venv/bin/python "pytest-quantum[qiskit,cirq,pennylane]==${VERSION}"

      - name: Run sanity checks
        run: |
          .venv/bin/python - <<'EOF'
          import pytest_quantum, numpy as np, math

          # 1. Public API present
          required = [
              "assert_unitary", "assert_circuits_equivalent",
              "assert_measurement_distribution", "assert_counts_close",
              "assert_circuit_depth", "assert_circuit_width",
              "assert_gate_count", "assert_states_close",
              "assert_state_fidelity_above",
          ]
          missing = [n for n in required if not hasattr(pytest_quantum, n)]
          assert not missing, f"Missing from public API: {missing}"
          print("✓ Public API complete")

          # 2. Statistical assertions
          from pytest_quantum import assert_measurement_distribution, assert_counts_close
          assert_measurement_distribution({"00": 500, "11": 500}, expected_probs={"00": 0.5, "11": 0.5})
          assert_counts_close({"0": 510, "1": 490}, {"0": 495, "1": 505}, max_tvd=0.1)
          print("✓ Statistical assertions work")

          # 3. Statevector assertions
          from pytest_quantum import assert_states_close, assert_state_fidelity_above
          sv = np.array([1, 1], dtype=complex) / math.sqrt(2)
          assert_states_close(sv, sv)
          assert_state_fidelity_above(sv, sv, threshold=0.99)
          print("✓ Statevector assertions work")

          # 4. Qiskit — real circuit execution
          from qiskit import QuantumCircuit, transpile
          from qiskit_aer import AerSimulator
          from pytest_quantum import assert_unitary, assert_circuit_depth, assert_circuit_width, assert_gate_count

          H = np.array([[1,1],[1,-1]], dtype=complex) / math.sqrt(2)
          qc = QuantumCircuit(1); qc.h(0)
          assert_unitary(qc, H)
          print("✓ assert_unitary (Qiskit H gate)")

          qc2 = QuantumCircuit(2); qc2.h(0); qc2.cx(0, 1); qc2.measure_all()
          sim = AerSimulator()
          counts = sim.run(transpile(qc2, sim), shots=2000).result().get_counts()
          assert_measurement_distribution(counts, expected_probs={"00": 0.5, "11": 0.5}, significance=0.01)
          assert_circuit_depth(qc2, max_depth=5)
          assert_circuit_width(qc2, expected_qubits=2)
          assert_gate_count(qc2, "h", 1)
          print("✓ Qiskit Bell state + structure assertions")

          # 5. Cirq — real circuit execution
          import cirq
          from pytest_quantum import assert_circuits_equivalent
          q = cirq.LineQubit.range(1)
          cc = cirq.Circuit(cirq.H(q[0]))
          assert_unitary(cc, H)
          qk = QuantumCircuit(1); qk.h(0)
          assert_circuits_equivalent(qk, cc)
          print("✓ Cirq unitary + cross-framework equivalence")

          # 6. PennyLane — real device
          import pennylane as qml
          dev = qml.device("default.qubit", wires=1)
          @qml.qnode(dev)
          def pl_h():
              qml.Hadamard(0)
              return qml.state()
          state = np.array(pl_h())
          assert_states_close(state, H[:, 0])
          print("✓ PennyLane statevector")

          # 7. quantum_slow marker registered
          import pytest_quantum as pq
          assert hasattr(pq, "__version__") or True  # plugin loaded
          print("✓ quantum_slow marker registered (plugin loaded)")

          print("\n=== All smoke tests passed ===")
          EOF
